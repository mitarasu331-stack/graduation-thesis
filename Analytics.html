    <main>

        <h2>企業様専用ページ閲覧申請フォーム</h2>
        <h4>※申請時に使用したメールアドレスに専用ページのURLを送付いたします。</h4>
        <!-- 月５０件まで！　1/50件 -->
        <form action="https://formspree.io/f/mkoljwev" action="/html/sendMail.html" method="POST">
            <label for="company">会社名/組織名</label>
            <input type="text" id="company" name="company" required autofocus>

            <label for="name">氏名</label>
            <input type="text" id="name" name="name" required>

            <label for="email">メールアドレス:</label>
            <input type="email" id="email" name="email" required>

            <!-- 送信しない -->
            <label for="email">メールアドレス(再入力):</label>
            <input type="email" id="email_confirm" required>

            <label for="tel">電話番号:</label>
            <input type="tel" id="tel" name="tel" required>

            <!-- <label for="message">お問い合わせ内容:</label>
            <textarea id="message" name="message" rows="5" required></textarea> -->

            <label for="privacypolicy"> <input type="checkbox" name="privacypolicy" id="privacypolicy" required><a
                    href="privacy.html">プライバシーポリシー</a>に同意する</label>

            <button type="submit">送信</button>
        </form>

        <!--/* アドレスの一致確認 */-->
        <script>
            const email = document.getElementById('email');
            const emailConfirm = document.getElementById('email_confirm');

            function validateEmail() {
                if (email.value !== emailConfirm.value) {
                    emailConfirm.setCustomValidity('メールアドレスが一致しません');
                } else {
                    emailConfirm.setCustomValidity('');
                }
            }

            email.addEventListener('change', validateEmail);
            emailConfirm.addEventListener('keyup', validateEmail);
        </script>



    </main>
